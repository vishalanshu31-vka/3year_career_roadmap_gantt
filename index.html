<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3-Year CS Career Roadmap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0c10;
    --surface:#12151c;
    --surface2:#1a1e28;
    --border:#2a2f3d;
    --text:#e8eaf0;
    --muted:#6b7280;
    --accent:#6c63ff;
    --c1:#6c63ff;--c1l:#a89cff;
    --c2:#00d4aa;--c2l:#5eecd3;
    --c3:#ff6b6b;--c3l:#ff9e9e;
    --c4:#ffa94d;--c4l:#ffd08a;
    --c5:#4dabf7;--c5l:#9bd4fc;
    --c6:#f06292;--c6l:#f48fb1;
    --c7:#69db7c;--c7l:#a8f5b4;
    --c8:#da77f2;--c8l:#efb3fb;
    --c9:#ff922b;--c9l:#ffc078;
    --c10:#74c0fc;--c10l:#bde0fd;
    --mono:'Space Mono',monospace;
    --sans:'DM Sans',sans-serif;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}

  header{padding:2rem 2.5rem 1.5rem;border-bottom:1px solid var(--border)}
  .header-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem}
  h1{font-family:var(--mono);font-size:1.4rem;color:#fff;letter-spacing:-.02em}
  h1 span{color:var(--accent)}
  .tagline{font-size:.8rem;color:var(--muted);margin-top:.4rem;font-family:var(--mono)}
  .badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:.35rem .9rem;font-size:.75rem;color:var(--muted);font-family:var(--mono);white-space:nowrap}

  .year-tabs{display:flex;gap:.5rem;padding:1.25rem 2.5rem;border-bottom:1px solid var(--border);overflow-x:auto}
  .tab{padding:.5rem 1.25rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--mono);font-size:.8rem;cursor:pointer;transition:all .2s;white-space:nowrap}
  .tab:hover{border-color:var(--accent);color:var(--text)}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

  .legend{display:flex;flex-wrap:wrap;gap:.6rem;padding:1rem 2.5rem;border-bottom:1px solid var(--border)}
  .leg-item{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--muted)}
  .leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

  .chart-wrap{overflow-x:auto;padding:1.5rem 2.5rem 2rem}
  .chart{min-width:900px}

  .timeline-header{display:grid;margin-left:190px;margin-bottom:.5rem;position:relative}
  .tl-label{font-family:var(--mono);font-size:.65rem;color:var(--muted);text-align:center}

  .track{display:flex;align-items:flex-start;margin-bottom:.5rem;min-height:36px}
  .track-label{width:185px;flex-shrink:0;padding-right:1rem;font-size:.75rem;color:var(--muted);font-family:var(--mono);padding-top:8px;line-height:1.3}
  .track-label strong{color:var(--text);display:block;font-size:.7rem}
  .track-bars{flex:1;position:relative;height:36px;background:var(--surface);border-radius:4px}

  .bar{position:absolute;height:28px;top:4px;border-radius:4px;cursor:pointer;transition:all .15s;display:flex;align-items:center;overflow:hidden;border:1px solid transparent}
  .bar:hover{filter:brightness(1.2);z-index:10;transform:scaleY(1.05)}
  .bar-label{font-size:.6rem;font-family:var(--mono);padding:0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}

  .tooltip{position:fixed;background:#1e2330;border:1px solid var(--border);border-radius:8px;padding:1rem;max-width:280px;z-index:1000;display:none;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
  .tt-title{font-family:var(--mono);font-size:.75rem;font-weight:700;margin-bottom:.5rem;color:#fff}
  .tt-days{font-family:var(--mono);font-size:.65rem;color:var(--muted);margin-bottom:.6rem}
  .tt-section{margin-bottom:.4rem}
  .tt-section-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem}
  .tt-section-value{font-size:.7rem;color:var(--text);line-height:1.5}
  .tt-output{font-size:.7rem;color:var(--c2);margin-top:.3rem;font-family:var(--mono)}

  .year-header{font-family:var(--mono);font-size:.85rem;color:var(--accent);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
  .year-desc{font-size:.75rem;color:var(--muted);margin-top:.25rem;font-family:var(--sans)}

  .stats-row{display:flex;gap:1rem;flex-wrap:wrap;padding:0 2.5rem 1.5rem}
  .stat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.75rem 1.25rem;flex:1;min-width:140px}
  .stat-val{font-family:var(--mono);font-size:1.3rem;font-weight:700;color:var(--accent)}
  .stat-lbl{font-size:.7rem;color:var(--muted);margin-top:.2rem}

  .grid-line{position:absolute;top:0;bottom:0;width:1px;background:var(--border);opacity:.4;pointer-events:none}

  @media(max-width:600px){
    header{padding:1.25rem}
    .chart-wrap{padding:1rem}
    .legend{padding:.75rem 1rem}
    .year-tabs{padding:.75rem 1rem}
    .stats-row{padding:0 1rem 1rem}
  }
</style>
</head>

let activeYear = 1;

function showYear(y, btn) {
  activeYear = y;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const d = DATA[activeYear];
  const totalDays = d.days;

  // Stats
  document.getElementById('stats').innerHTML = d.stats.map(s =>
    `<div class="stat"><div class="stat-val">${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`
  ).join('');

  // Build chart
  const LABEL_W = 185;
  const BAR_W = 700;

  // Generate month labels
  const months = [];
  const daysPerMonth = totalDays / 12;
  for (let i = 0; i < 12; i++) {
    months.push({label: `M${i+1}`, pct: ((i * daysPerMonth + daysPerMonth/2) / totalDays * 100).toFixed(1)});
  }

  let html = `<div class="year-header">${d.label}: ${d.desc}<div class="year-desc">Hover over any block to see topics, practice goals, and output</div></div>`;

  // Timeline header
  html += `<div class="timeline-header" style="grid-template-columns: repeat(12, 1fr)">`;
  for (let i = 0; i < 12; i++) {
    html += `<div class="tl-label">Month ${i+1}</div>`;
  }
  html += `</div>`;

  // Tracks
  for (const track of TRACKS) {
    const blocks = d.blocks[track.id] || [];
    html += `<div class="track">
      <div class="track-label"><strong>${track.label}</strong>${track.sub}</div>
      <div class="track-bars" style="background:${track.bg}20;">`;

    // Grid lines
    for (let i = 1; i < 12; i++) {
      const pct = (i / 12 * 100).toFixed(2);
      html += `<div class="grid-line" style="left:${pct}%"></div>`;
    }

    for (const b of blocks) {
      const left = ((b.s - 1) / totalDays * 100).toFixed(2);
      const width = ((b.e - b.s + 1) / totalDays * 100).toFixed(2);
      const dataStr = encodeURIComponent(JSON.stringify({
        title: b.title, s: b.s, e: b.e,
        topics: b.topics, practice: b.practice, output: b.output,
        color: track.color, track: track.label
      }));
      html += `<div class="bar" 
        style="left:${left}%;width:${width}%;background:${track.color}26;border-color:${track.color}60;"
        onmouseenter="showTip(event,'${dataStr}')"
        onmouseleave="hideTip()">
        <span class="bar-label" style="color:${track.color}">${b.title}</span>
      </div>`;
    }

    html += `</div></div>`;
  }

  // Day range ruler
  html += `<div class="track" style="margin-top:.5rem">
    <div class="track-label" style="font-size:.6rem;color:var(--muted)">Day range</div>
    <div class="track-bars" style="background:transparent;display:flex;align-items:center">`;
  const steps = 12;
  for (let i = 0; i <= steps; i++) {
    const day = Math.round((i / steps) * totalDays);
    const left = (i / steps * 100).toFixed(1);
    html += `<div style="position:absolute;left:${left}%;transform:translateX(-50%);font-size:.6rem;color:var(--muted);font-family:var(--mono)">D${day}</div>`;
  }
  html += `</div></div>`;

  document.getElementById('chart').innerHTML = html;
}

function showTip(e, dataStr) {
  const d = JSON.parse(decodeURIComponent(dataStr));
  const tt = document.getElementById('tooltip');
  tt.innerHTML = `
    <div class="tt-title" style="color:${d.color}">${d.title}</div>
    <div class="tt-days">📅 Day ${d.s} – ${d.e} (${d.e - d.s + 1} days) · ${d.track}</div>
    <div class="tt-section">
      <div class="tt-section-label">Topics</div>
      <div class="tt-section-value">${d.topics}</div>
    </div>
    <div class="tt-section">
      <div class="tt-section-label">Practice Goal</div>
      <div class="tt-section-value">${d.practice}</div>
    </div>
    <div class="tt-output">→ Output: ${d.output}</div>
  `;
  tt.style.display = 'block';
  moveTip(e);
}

function moveTip(e) {
  const tt = document.getElementById('tooltip');
  const x = e.clientX + 16;
  const y = e.clientY - 10;
  const w = tt.offsetWidth;
  const h = tt.offsetHeight;
  tt.style.left = (x + w > window.innerWidth ? x - w - 32 : x) + 'px';
  tt.style.top = (y + h > window.innerHeight ? y - h : y) + 'px';
}

function hideTip() {
  document.getElementById('tooltip').style.display = 'none';
}

document.addEventListener('mousemove', e => {
  if (document.getElementById('tooltip').style.display !== 'none') moveTip(e);
});

render();
</script>
